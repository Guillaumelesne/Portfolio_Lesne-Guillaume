<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header · Guillaume Lesne</title>
  <!-- Liaison vers le fichier CSS externe -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header-wrapper">
    <header class="site-header">
      <!-- partie gauche : nom avec les deux typographies empilées -->
      <div class="header-name">
        <span class="name-top">LESNE GUILLAUME</span>
        <span class="name-bottom">DESIGNER</span>
      </div>

      <!-- zone navigation : TOUS LES LIENS À L'HORIZONTALE -->
      <nav class="header-nav">
		<a href="#moi" class="nav-item">MOI</a>
        <a href="#" class="nav-item">CONTACT</a>
        <a href="#" class="nav-item">PROJECT</a>
        <a href="#" class="nav-item">PORTFOLIO</a>
      </nav>

    </header>

    <!-- zone supplémentaire pour montrer qu'on peut ajouter du contenu simplement -->
    <div id="moi">

    </div>

  <!-- petit message d'info sur les polices (visible si les fichiers locaux ne sont pas trouvés) -->
  <div class="info-message">
    ⚙️ Si les fichiers de police ne sont pas au chemin indiqué, des polices de secours s'affichent.
    Placez <code>typo/Fonseca Grande  - Free Version.otf</code>, <code>typo/Designer-Book.otf</code> et <code>typo/SourceSansVariable-Roman.otf</code>
    (ou ajustez les <code>@font-face</code>).
  </div>
</body>
</html>
